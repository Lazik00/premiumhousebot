server {
    server_name akhcomm.nuqtauz.com;

    client_max_body_size 50M;

    # --- Premium House / Telegram WebApp ---
    location / {
        proxy_pass         http://127.0.0.1:8089;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
        proxy_read_timeout 300;
        proxy_buffering    off;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/akhcomm.nuqtauz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/akhcomm.nuqtauz.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name akhcomm.nuqtauz.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 301 https://$host$request_uri;
}
