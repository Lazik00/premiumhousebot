services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    environment:
      - NGINX_HTTP_PORT=${NGINX_HTTP_PORT:-8088}
      - FRONTEND_PORT=${FRONTEND_PORT:-3100}
      - BACKEND_PORT=${BACKEND_PORT:-8100}
    command: >
      /bin/sh -c "envsubst '$$NGINX_HTTP_PORT $$FRONTEND_PORT $$BACKEND_PORT'
      < /etc/nginx/templates/nginx.conf.template
      > /etc/nginx/nginx.conf && exec nginx -g 'daemon off;'"
    ports:
      - '${NGINX_HTTP_PORT:-8088}:${NGINX_HTTP_PORT:-8088}'
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=${FRONTEND_PORT:-3100}
      - NEXT_PUBLIC_API_BASE=/api/v1
    expose:
      - '${FRONTEND_PORT:-3100}'
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${BACKEND_PORT:-8100} --proxy-headers"
    env_file:
      - ../.env
    environment:
      - APP_NAME=${APP_NAME:-Premium House API}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-false}
      - SWAGGER_ENABLED=${SWAGGER_ENABLED:-true}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://premium:premium@postgres:5434/premium_house}
      - REDIS_URL=${REDIS_URL:-redis://redis:6391/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6391/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6391/2}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9100}
      - SECRET_KEY=${SECRET_KEY:-change-this}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - DEFAULT_COMMISSION_PERCENT=${DEFAULT_COMMISSION_PERCENT:-12}
      - BOOKING_PENDING_EXPIRY_MINUTES=${BOOKING_PENDING_EXPIRY_MINUTES:-15}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:${BACKEND_PORT:-8100}/api/v1/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    expose:
      - '${BACKEND_PORT:-8100}'
    restart: unless-stopped

  seed:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD:-premium}
    volumes:
      - ./sql/seed_houses.sql:/seed/seed_houses.sql:ro
    command: >
      sh -c "psql -h postgres -p ${POSTGRES_PORT:-5434} -U ${POSTGRES_USER:-premium} -d ${POSTGRES_DB:-premium_house} -f /seed/seed_houses.sql && echo 'seed completed'"
    restart: "no"

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.worker.celery_app worker -l info
    env_file:
      - ../.env
    environment:
      - APP_NAME=${APP_NAME:-Premium House API}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-false}
      - SWAGGER_ENABLED=${SWAGGER_ENABLED:-true}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://premium:premium@postgres:5434/premium_house}
      - REDIS_URL=${REDIS_URL:-redis://redis:6391/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6391/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6391/2}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9100}
      - SECRET_KEY=${SECRET_KEY:-change-this}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - DEFAULT_COMMISSION_PERCENT=${DEFAULT_COMMISSION_PERCENT:-12}
      - BOOKING_PENDING_EXPIRY_MINUTES=${BOOKING_PENDING_EXPIRY_MINUTES:-15}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.worker.celery_app beat -l info -s /tmp/celerybeat-schedule
    env_file:
      - ../.env
    environment:
      - APP_NAME=${APP_NAME:-Premium House API}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-false}
      - SWAGGER_ENABLED=${SWAGGER_ENABLED:-true}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://premium:premium@postgres:5434/premium_house}
      - REDIS_URL=${REDIS_URL:-redis://redis:6391/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6391/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6391/2}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9100}
      - SECRET_KEY=${SECRET_KEY:-change-this}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - DEFAULT_COMMISSION_PERCENT=${DEFAULT_COMMISSION_PERCENT:-12}
      - BOOKING_PENDING_EXPIRY_MINUTES=${BOOKING_PENDING_EXPIRY_MINUTES:-15}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    command: ['postgres', '-p', '${POSTGRES_PORT:-5434}']
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-premium_house}
      - POSTGRES_USER=${POSTGRES_USER:-premium}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-premium}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -p ${POSTGRES_PORT:-5434} -U ${POSTGRES_USER:-premium} -d ${POSTGRES_DB:-premium_house}']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_PORT:-5434}:${POSTGRES_PORT:-5434}'
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    command: ['redis-server', '--appendonly', 'yes', '--port', '${REDIS_PORT:-6391}']
    healthcheck:
      test: ['CMD', 'redis-cli', '-p', '${REDIS_PORT:-6391}', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis_data:/data
    ports:
      - '${REDIS_PORT:-6391}:${REDIS_PORT:-6391}'
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: ['server', '/data', '--address', ':${MINIO_API_PORT:-9100}', '--console-address', ':${MINIO_CONSOLE_PORT:-9101}']
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '${MINIO_API_PORT:-9100}:${MINIO_API_PORT:-9100}'
      - '${MINIO_CONSOLE_PORT:-9101}:${MINIO_CONSOLE_PORT:-9101}'
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
